name: Deploy Bridge Application to Remote Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-'

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build project with Gradle
        run: ./gradlew clean build --no-daemon -x test
        env:
          GITHUB_TOKEN: ${{ secrets.JAVA_TOKEN }}

      - name: Extract service name from .service file
        id: extract-service-name
        run: |
          SERVICE_FILE=$(find . -maxdepth 1 -name "*.service" -type f)
          if [ -z "$SERVICE_FILE" ]; then
            echo "No .service file found in the repository."
            exit 1
          fi
          SERVICE_NAME=$(basename "$SERVICE_FILE" .service)
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV

      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Copy JAR file to remote server
        run: |
          scp -o StrictHostKeyChecking=no build/libs/*.jar ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.REMOTE_APP_DIR }}
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Restart service on remote server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "sudo systemctl restart ${{ env.SERVICE_NAME }}"
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}