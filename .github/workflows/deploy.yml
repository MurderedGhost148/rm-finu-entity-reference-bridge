name: Deploy Spring Boot Application to Remote Server

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-'

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build project with Gradle
        run: ./gradlew clean build --no-daemon -x test
        env:
          GITHUB_TOKEN: ${{ secrets.JAVA_TOKEN }}

      - name: Extract service name from .service file
        id: extract-service-name
        run: |
          SERVICE_FILE=$(find . -maxdepth 1 -name "*.service" -type f)
          if [ -z "$SERVICE_FILE" ]; then
            echo "No .service file found in the repository."
            exit 1
          fi
          SERVICE_NAME=$(basename "$SERVICE_FILE" .service)
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV

      - name: Set environment variables including SSH key
        run: |
          if [ "$GITHUB_REF" = "refs/heads/develop" ]; then
            echo "REMOTE_USER=${{ secrets.DEV_SSH_USER }}" >> "$GITHUB_ENV"
            echo "REMOTE_HOST=${{ secrets.DEV_SSH_HOST }}" >> "$GITHUB_ENV"
            echo "REMOTE_DIR=${{ vars.DEV_REMOTE_APP_DIR }}" >> "$GITHUB_ENV"
            echo "SSH_KEY<<EOF" >> "$GITHUB_ENV"
            echo "${{ secrets.DEV_SSH_KEY }}" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "REMOTE_USER=${{ secrets.PROD_SSH_USER }}" >> "$GITHUB_ENV"
            echo "REMOTE_HOST=${{ secrets.PROD_SSH_HOST }}" >> "$GITHUB_ENV"
            echo "REMOTE_DIR=${{ vars.PROD_REMOTE_APP_DIR }}" >> "$GITHUB_ENV"
            echo "SSH_KEY<<EOF" >> "$GITHUB_ENV"
            echo "${{ secrets.PROD_SSH_KEY }}" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "Branch is not deployable. Exiting."
            exit 1
          fi

      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ env.SSH_KEY }}

      - name: Copy JAR file to remote server
        run: |
          scp -o StrictHostKeyChecking=no build/libs/*.jar $REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR

      - name: Restart service on remote server
        run: |
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "sudo systemctl restart ${{ env.SERVICE_NAME }}"